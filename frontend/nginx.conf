server {
    listen 80;
    server_name web-kuhub.questweb.cl www.web-kuhub.questweb.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name web-kuhub.questweb.cl www.web-kuhub.questweb.cl;

    ssl_certificate     /etc/letsencrypt/live/web-kuhub.questweb.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web-kuhub.questweb.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Configuración de Compresión Gzip ──────────────────
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 5;
        gzip_min_length 2048;

        gzip_types
            text/plain
            text/css
            application/json
            application/javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript;
        # ──────────────────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy de API al backend (red interna Docker)
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8080;

    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # Frontend React (SPA)
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
