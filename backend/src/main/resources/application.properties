# ======================================================================
# DATASOURCE CONFIGURATION (Con Variables de Entorno)
# ======================================================================
# Si existe SPRING_DATASOURCE_URL (en AWS), la usa. Si no, usa localhost (para tu PC)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Kuhub_mat_local}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234567}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================================
# JPA/HIBERNATE CONFIGURATION
# ======================================================================
# ddl-auto=none — esquema ya existe en BD, Hibernate no toca la estructura
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar consultas SQL (�til para debugear, aunque en producci�n suele ponerse en false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar inicializaci�n autom�tica
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ======================================================================
# SERVER CONFIGURATION
# ======================================================================
server.port=8080

# ======================================================================
# MULTIPART / FILE UPLOAD
# ======================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB

# ======================================================================
# LOGGING CONFIGURATION
# ======================================================================
logging.level.root=INFO
logging.level.com.kuhub=DEBUG
logging.level.KuHub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ======================================================================
# SWAGGER / OPENAPI
# ======================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ======================================================================
# ASISTENTE IA (Ollama) — Instancia C dedicada
# Ver CONFIGURATION_HOST_IA.md.
# La URL usa la IP privada VPC como fallback de produccion.
# En local, application-mat.properties la sobreescribe a localhost (tunnel SSH).
# Sobreescribible por variables de entorno (KUHUB_IA_*).
# ======================================================================
kuhub.ia.ollama-url=${KUHUB_IA_OLLAMA_URL:http://172.26.14.71:11434}
kuhub.ia.model=${KUHUB_IA_MODEL:qwen2.5:1.5b}
# Modelos que el frontend puede seleccionar (whitelist anti-inyeccion). El principal se agrega solo.
kuhub.ia.allowed-models=${KUHUB_IA_ALLOWED_MODELS:qwen2.5:1.5b,llama3.2:1b,gemma2:2b}
kuhub.ia.timeout-seconds=${KUHUB_IA_TIMEOUT:120}
kuhub.ia.num-ctx=${KUHUB_IA_NUM_CTX:2048}
kuhub.ia.num-predict=${KUHUB_IA_NUM_PREDICT:512}