# ======================================================================
# PERFIL ACTIVO
# ======================================================================
# Localmente activa application-mat.properties. En AWS sobreescribir con:
#   SPRING_PROFILES_ACTIVE=prod  (o cualquier perfil que no sea mat)
# Las variables de entorno (SPRING_DATASOURCE_URL, etc.) siempre ganan sobre los profiles.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mat}

# ======================================================================
# DATASOURCE CONFIGURATION
# ======================================================================
# Valores provistos por el perfil activo (application-mat.properties en local)
# o por variables de entorno en produccion (AWS).
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================================
# JPA/HIBERNATE CONFIGURATION
# ======================================================================
# ddl-auto=none — esquema ya existe en BD, Hibernate no toca la estructura
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar consultas SQL (�til para debugear, aunque en producci�n suele ponerse en false)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar inicializaci�n autom�tica
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ======================================================================
# SERVER CONFIGURATION
# ======================================================================
server.port=8080

# ======================================================================
# MULTIPART / FILE UPLOAD
# ======================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB

# ======================================================================
# LOGGING CONFIGURATION
# ======================================================================
logging.level.root=INFO
logging.level.com.kuhub=DEBUG
logging.level.KuHub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ======================================================================
# SWAGGER / OPENAPI
# ======================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html