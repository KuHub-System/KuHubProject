services:
  # Backend (Spring Boot) - Conecta a AWS RDS PostgreSQL
  backend:
    image: ${DOCKER_USERNAME}/kuhub-app:backend-${TAG}
    container_name: kuhub-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${KU_AWS_AC_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${KU_AWS_AC_DB_PASS}
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx1024m -Xms768m
      - LOGGING_LEVEL_ORG_HIBERNATE_SQL=DEBUG
      - LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND=TRACE
      # === Asistente IA (Ollama) — Instancia C dedicada (VPC privada) ===
      # Hardcodeado por ahora para que la IA funcione en el deploy y quede rastreable.
      # TODO: mover estos valores a GitHub Secrets / .env del servidor (variables KUHUB_IA_*).
      - KUHUB_IA_OLLAMA_URL=http://172.26.14.71:11434
      - KUHUB_IA_MODEL=qwen2.5:1.5b
      - KUHUB_IA_ALLOWED_MODELS=qwen2.5:1.5b,llama3.2:1b,gemma2:2b
      # Timeout amplio para cubrir la carga en frio de Gemma 2 (~70 s) + inferencia.
      - KUHUB_IA_TIMEOUT=180
    deploy:
      resources:
        limits:
          memory: 1400M
        reservations:
          memory: 1024M

  # Frontend (React + Nginx)
  frontend:
    image: ${DOCKER_USERNAME}/kuhub-app:frontend-${TAG}
    container_name: kuhub-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M